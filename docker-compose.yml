services:
  localstack:
    image: localstack/localstack:3.8.1
    container_name: drive-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - PERSISTENCE=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: clon-drive-backend
    ports:
      - "3001:3001"
    environment:
      - S3_ENDPOINT=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: clon-drive-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend